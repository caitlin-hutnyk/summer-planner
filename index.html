<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#ffe0c2" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Summer 2026" />
<title>Summer 2026 · Weekend Planner</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☀️</text></svg>">
<style>
  :root {
    --bg-1: #fff1e6; --bg-2: #ffe0c2; --bg-3: #cfe9ff;
    --ink: #2b2b3a; --ink-soft: #6b6b80;
    --line: #e7e7ef;
    --free: #1faa6b; --free-bg: #e7f8ef; --free-line: #bfe9d3;
    --tentative: #d68a00; --tentative-bg: #fff6e2;
    --music: #e84a8a; --family: #f08a3c; --away: #4a86e8; --outdoors: var(--away); --social: #a688c8; --travel: var(--away); --sports: #f59e0b; --hike: #16a34a;
    --shadow: 0 6px 22px rgba(60, 50, 90, 0.10);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--ink);
    background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 38%, var(--bg-3) 100%);
    background-attachment: fixed; min-height: 100vh; line-height: 1.45;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 32px 20px 60px; }
  header h1 { margin: 0; font-size: 34px; letter-spacing: -0.5px; }
  header .sun { font-size: 30px; }
  header p.sub { margin: 6px 0 0; color: var(--ink-soft); font-size: 15px; max-width: 760px; }

  /* stats */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 22px 0 8px; }
  .stat {
    background: rgba(255,255,255,0.72); border: 1px solid rgba(255,255,255,0.8);
    border-radius: 14px; padding: 14px 16px; box-shadow: var(--shadow);
  }
  .stat .num { font-size: 26px; font-weight: 700; line-height: 1; }
  .stat .lbl { font-size: 12px; color: var(--ink-soft); margin-top: 6px; }

  /* legend */
  .legend { display: flex; flex-wrap: wrap; gap: 14px; margin: 18px 0 8px; font-size: 12.5px; color: var(--ink-soft); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 11px; height: 11px; border-radius: 3px; display: inline-block; }

  /* calendar */
  .cal {
    background: rgba(255,255,255,0.86); border: 1px solid rgba(255,255,255,0.9);
    border-radius: 16px; padding: 14px 16px 16px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .cal h2 { margin: 2px 2px 12px; font-size: 20px; }
  .dow { display: grid; grid-template-columns: repeat(7, 1fr); position: sticky; top: 0; z-index: 5; background: rgba(255,255,255,0.96); border-bottom: 1px solid var(--line); }
  .dow-cell { font-size: 11px; font-weight: 700; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .5px; padding: 4px 8px; }
  .dow-cell.we { color: #2f7fb0; }

  .weeks { display: flex; flex-direction: column; }
  .week { display: grid; grid-template-columns: repeat(7, 1fr); }
  .daycell { border: 1px solid var(--line); background: #fff; min-height: 64px; overflow: hidden; }
  .daycell.weekend, .daycell.holiday { background: #f4faff; }
  .daycell.out { background: #fafafb; }
  .daycell.out .daynum { color: #cdcdd8; }
  .daycell.today { box-shadow: inset 0 0 0 2px var(--free); }
  .daynum { display: inline-block; font-size: 11.5px; color: #9a9ab0; padding: 4px 7px; font-weight: 600; }
  .daycell.weekend .daynum, .daycell.holiday .daynum { color: #2f7fb0; }
  .holiday-name { display: inline-block; vertical-align: middle; font-size: 9px; color: #2f7fb0; font-weight: 700; text-transform: uppercase; letter-spacing: .2px; max-width: calc(100% - 30px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .month-tag { display: inline-block; vertical-align: middle; font-size: 9.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: #5b5b6e; padding-left: 7px; }
  .daycell.first .daynum { padding-left: 3px; }
  .week.month-start { border-top: 2px solid #c9c9d8; margin-top: 9px; }

  .evbar {
    margin: 1px 4px; border-radius: 7px; font-size: 11.5px; line-height: 1.5;
    padding: 1px 8px; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    z-index: 2; align-self: center; font-weight: 600;
  }
  .evbar.clipL { border-top-left-radius: 0; border-bottom-left-radius: 0; margin-left: 0; }
  .evbar.clipR { border-top-right-radius: 0; border-bottom-right-radius: 0; margin-right: 0; }

  .ev-music    { background: var(--music); }
  .ev-family   { background: var(--family); }
  .ev-outdoors { background: var(--away); }
  .ev-social   { background: var(--social); }
  .ev-travel   { background: var(--away); }
  .ev-sports   { background: var(--sports); }
  .ev-hike     { background: var(--hike); }
  .ev-free     { background: var(--free-bg); color: var(--free); border: 1px solid var(--free-line); }
  .evbar.tentative { background: rgba(255,255,255,0.9) !important; border: 1.5px dashed currentColor; padding: 0 7px; }
  .ev-music.tentative    { color: var(--music); }
  .ev-family.tentative   { color: var(--family); }
  .ev-outdoors.tentative { color: var(--away); }
  .ev-social.tentative   { color: var(--social); }
  .ev-travel.tentative   { color: var(--away); }
  .ev-sports.tentative   { color: var(--sports); }
  .ev-hike.tentative     { color: var(--hike); }
  .evbar.ongoing { background: transparent !important; border: none; border-bottom: 1.5px solid currentColor; border-radius: 0; margin: 0 4px 2px; padding: 0 3px; font-style: italic; font-weight: 400; }
  .ev-music.ongoing    { color: var(--music); }
  .ev-family.ongoing   { color: var(--family); }
  .ev-outdoors.ongoing { color: var(--away); }
  .ev-social.ongoing   { color: var(--social); }
  .ev-travel.ongoing   { color: var(--away); }
  .ev-sports.ongoing   { color: var(--sports); }

  @media (max-width: 560px) {
    body { -webkit-text-size-adjust: 100%; }
    .wrap { padding: 14px 9px 44px; }
    header h1 { font-size: 25px; }
    header .sun { font-size: 22px; }
    header p.sub { font-size: 12.5px; line-height: 1.4; }
    .stats { grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 16px 0 6px; }
    .stat { padding: 11px 12px; border-radius: 12px; }
    .stat .num { font-size: 20px; }
    .stat .lbl { font-size: 10.5px; margin-top: 4px; }
    .legend { gap: 8px 12px; font-size: 11px; margin: 12px 0 8px; }
    .cal { padding: 7px 7px 9px; border-radius: 13px; }
    .dow-cell { font-size: 8.5px; padding: 3px 1px; text-align: center; letter-spacing: .2px; }
    .daycell { min-height: 58px; }
    .daynum { font-size: 10px; padding: 3px 4px; }
    .month-tag { font-size: 8px; padding-left: 3px; letter-spacing: .3px; }
    .holiday-name { font-size: 7px; letter-spacing: 0; }
    .evbar { font-size: 8.5px; padding: 0 3px; margin: 1px 1.5px; border-radius: 5px; line-height: 1.5; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1><span class="sun">&#9728;&#65039;</span> Summer 2026</h1>
    <p class="sub">Your weekends from now through the end of summer. Saturdays, Sundays &amp; holidays are shaded blue.</p>
  </header>

  <div class="stats" id="stats"></div>

  <div class="legend">
    <span><i class="dot" style="background:#dceeff;border:1px solid #b9dcf5"></i> Weekend / holiday</span>
    <span><i class="dot" style="background:#fff;border:1.5px dashed var(--music)"></i> Tentative</span>
    <span><i style="display:inline-block;width:20px;height:0;border-bottom:1.5px solid var(--social);vertical-align:middle"></i> Ongoing</span>
    <span><i class="dot" style="background:var(--music)"></i> Music</span>
    <span><i class="dot" style="background:var(--social)"></i> Friends &amp; family</span>
    <span><i class="dot" style="background:var(--hike)"></i> Hike</span>
    <span><i class="dot" style="background:var(--sports)"></i> Sports</span>
    <span><i class="dot" style="background:var(--away)"></i> Travel</span>
  </div>

  <div id="calendar"></div>
</div>

<script>
const DAY = 86400000;
const D = (y, m, d) => new Date(y, m - 1, d);
const DEPART = D(2026, 9, 1); // Europe departure

const EVENTS = [
  { id:"free-jun",   t:"Open weekend",            cat:"free",     status:"free",      s:D(2026,6,6),  e:D(2026,6,7) },
  { id:"sultan",     t:"Sultan + Shepard",        cat:"music",    status:"tentative", s:D(2026,7,19), e:D(2026,7,19), note:"4pm" },
  { id:"anson",      t:"Anson's birthday",        cat:"social",   status:"confirmed", s:D(2026,6,12), e:D(2026,6,12), note:"Birthday on the 12th" },
  { id:"brohm",      t:"Brohm Loop",               cat:"hike",     status:"confirmed",                 s:D(2026,6,13), e:D(2026,6,13) },
  { id:"jazz-fest",  t:"🎷 Vancouver Jazz Fest",    cat:"music",    status:"confirmed", s:D(2026,6,19), e:D(2026,7,5),  ongoing:true, note:"Ongoing Jun 19–Jul 5 · not attending every night, but catching a few shows while it's on" },
  { id:"lb-trip",    t:"Long Beach",                               cat:"travel",   status:"confirmed", away:true,      s:D(2026,6,18), e:D(2026,6,21), note:"Thu night → Sun afternoon" },
  { id:"apocalypse", t:"Apocalypse",                    cat:"music",    status:"confirmed",                 s:D(2026,6,19), e:D(2026,6,20), note:"Long Beach, CA · Fri–Sat" },
  { id:"camp-wt",    t:"Wendy Thompson Hut",       cat:"hike",     status:"confirmed", away:true,      s:D(2026,6,27), e:D(2026,6,28), note:"With friends · overnight hut trip" },
  { id:"seymour",    t:"Mount Seymour",            cat:"hike",     status:"confirmed",                 s:D(2026,6,30), e:D(2026,6,30) },

  { id:"nicola",     t:"Nicola arrives",           cat:"social",   status:"confirmed", ongoing:true,   s:D(2026,7,2),  e:D(2026,7,2) },
  { id:"fvded",      t:"FVDED",                   cat:"music",    status:"confirmed",                 s:D(2026,7,3),  e:D(2026,7,4),  note:"Festival" },
  { id:"needle",     t:"Needle Peak",              cat:"hike",     status:"confirmed",                 s:D(2026,7,7),  e:D(2026,7,7) },
  { id:"island-dad", t:"Courtenay w/ Dad",          cat:"travel",   status:"confirmed", away:true,      s:D(2026,7,11), e:D(2026,7,13), note:"Back Monday morning" },
  { id:"becher",     t:"Mt Becher",                cat:"hike",     status:"tentative",                 s:D(2026,7,12), e:D(2026,7,12), note:"Near Courtenay" },
  { id:"gott",       t:"Gott Peak",                cat:"hike",     status:"tentative",                 s:D(2026,7,17), e:D(2026,7,18) },
  { id:"free-jul",   t:"Open weekend",            cat:"free",     status:"free",                      s:D(2026,7,18), e:D(2026,7,19) },
  { id:"merina-yvr", t:"Merina in town",          cat:"social",   status:"confirmed", ongoing:true,   s:D(2026,7,23), e:D(2026,7,26), note:"In town Jul 23–26" },
  { id:"merina-stay",t:"Merina staying over",     cat:"social",   status:"confirmed",                 s:D(2026,7,23), e:D(2026,7,24), note:"Thursday night + Friday together — Squamish?" },
  { id:"harvey",     t:"Mt Harvey",                cat:"hike",     status:"tentative",                 s:D(2026,7,26), e:D(2026,7,26) },

  { id:"cabin",      t:"Sevilla cabin",           cat:"outdoors", status:"confirmed", away:true,      s:D(2026,7,31), e:D(2026,8,2),  note:"With friends · flight 5pm Friday" },
  { id:"isoxo",      t:"ISOxo @ PNE",              cat:"music",    status:"confirmed",                 s:D(2026,8,7),  e:D(2026,8,7) },
  { id:"edmonton",   t:"Edmonton w/ Merina", cat:"travel",   status:"tentative", away:true,      s:D(2026,8,8),  e:D(2026,8,11), note:"Takes the Aug 8–9 weekend" },
  { id:"spirit",     t:"Spirit Quest",             cat:"hike",     status:"tentative",                 s:D(2026,8,10), e:D(2026,8,10), note:"Squamish" },
  { id:"vball-tourney", t:"Volleyball tournament",  cat:"sports",   status:"tentative", s:D(2026,8,15), e:D(2026,8,15), note:"🏐 Saturday only" },
  { id:"boston",     t:"Boston (work)",            cat:"travel",   status:"tentative", away:true,      s:D(2026,8,17), e:D(2026,8,21), note:"Possible work trip · Mon–Fri, no weekend overlap" },
  { id:"mom60",      t:"Mom's 60th",              cat:"social",   status:"tentative", s:D(2026,8,22), e:D(2026,8,23), note:"Family stuff" },
  { id:"strokes",    t:"The Strokes",             cat:"music",    status:"confirmed", s:D(2026,8,27), e:D(2026,8,27), note:"Vancouver" },
  { id:"arcuri",     t:"Jeff Arcuri show",    cat:"music",    status:"confirmed", s:D(2026,8,30), e:D(2026,8,30), note:"Stanley Park · pack for Malta!" },
  { id:"europe",     t:"Europe",                  cat:"travel",   status:"confirmed", away:true,      s:D(2026,9,1),  e:D(2026,9,21), note:"YVR → MLA Sep 1 · ZRH → YVR Sep 21" },
  { id:"wah-malta",  t:"WAH Malta",               cat:"music",    status:"confirmed", s:D(2026,9,4),  e:D(2026,9,6),  note:"DNB festival — the anchor of the trip. Uno Malta + Armier Beach + boat parties." },
];

const RANGE_START = D(2026, 6, 1);
const RANGE_END = D(2026, 9, 30);


const HOLIDAYS = [
  { name:"Canada Day",                                  short:"Canada Day",            date:D(2026,7,1) },
  { name:"Civic Holiday",                               short:"Civic Holiday",         date:D(2026,8,3) },
  { name:"Labour Day",                                  short:"Labour Day",            date:D(2026,9,7) },
  { name:"National Day for Truth and Reconciliation",   short:"Truth & Reconciliation", date:D(2026,9,30) },
];
const holidayFor = date => HOLIDAYS.find(h => sameDay(h.date, date)) || null;

// ---- helpers ----
const statusOf = ev => ev.status;
const dowMon = date => (date.getDay() + 6) % 7;
const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();

// ---- stats ----
function renderStats() {
  const today = new Date();
  const days = Math.max(0, Math.ceil((DEPART - today) / DAY));
  const open = EVENTS.filter(e => e.cat === "free").length;
  const tent = EVENTS.filter(e => statusOf(e) === "tentative").length;
  // Count Saturdays Jun–Sep 21; flag those overlapping an away:true event
  const summerEnd = D(2026, 9, 21);
  let totalWknds = 0, awayWknds = 0;
  for (let d = new Date(RANGE_START); d <= summerEnd; d.setDate(d.getDate() + 1)) {
    if (d.getDay() !== 6) continue;
    totalWknds++;
    if (EVENTS.some(ev => ev.away && ev.s <= d && ev.e >= d)) awayWknds++;
  }
  const stats = [
    { num: days, lbl: "days until Europe ✈️" },
    { num: `${awayWknds} / ${totalWknds}`, lbl: "weekends away Jun–Sep" },
    { num: open, lbl: "fully open weekends" },
    { num: tent, lbl: "tentative plans to confirm" },
  ];
  document.getElementById("stats").innerHTML = stats.map(s =>
    `<div class="stat"><div class="num">${s.num}</div><div class="lbl">${s.lbl}</div></div>`).join("");
}

// ---- calendar ----
function renderCalendar() {
  const gridStart = new Date(RANGE_START); gridStart.setDate(RANGE_START.getDate() - dowMon(RANGE_START));
  const gridEnd = new Date(RANGE_END); gridEnd.setDate(RANGE_END.getDate() + (6 - dowMon(RANGE_END)));

  const dow = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"]
    .map((d, i) => `<div class="dow-cell ${i >= 5 ? "we" : ""}">${d}</div>`).join("");

  // Pass 1: lay out every week (assign lanes) and find the busiest lane count
  const weeks = [];
  let maxLanes = 2;
  for (let ws = new Date(gridStart); ws <= gridEnd; ws.setDate(ws.getDate() + 7)) {
    const w = layoutWeek(new Date(ws), weeks.length);
    maxLanes = Math.max(maxLanes, w.laneCount);
    weeks.push(w);
  }

  // Pass 2: render every week with the same lane-row count so all cells share the max height
  const weeksHTML = weeks.map(w => weekHTML(w, maxLanes)).join("");
  document.getElementById("calendar").innerHTML =
    `<section class="cal"><div class="dow">${dow}</div><div class="weeks">${weeksHTML}</div></section>`;
}

function layoutWeek(weekStart, weekIndex) {
  const weekStartT = weekStart.getTime();
  const weekEndT = weekStartT + 6 * DAY;

  const makeSeg = (ev) => {
    const evS = ev.s.getTime(), evE = ev.e.getTime();
    if (evS > weekEndT || evE < weekStartT) return null; // no overlap with this visible week
    const effStart = Math.max(evS, weekStartT);
    const effEnd = Math.min(evE, weekEndT);
    const colStart = Math.round((effStart - weekStartT) / DAY) + 1;
    const span = Math.round((effEnd - effStart) / DAY) + 1;
    return { ev, colStart, colEnd: colStart + span - 1, span, clipL: evS < weekStartT, clipR: evE > weekEndT };
  };

  const segs = [];
  EVENTS.forEach(ev => { if (ev.cat === "free") return; const s = makeSeg(ev); if (s) segs.push(s); });

  // stack overlapping events into lanes
  segs.sort((a, b) => a.colStart - b.colStart || b.span - a.span);
  const lanes = [];
  segs.forEach(seg => {
    let placed = false;
    for (let i = 0; i < lanes.length; i++) {
      if (lanes[i].every(o => seg.colStart > o.colEnd || seg.colEnd < o.colStart)) {
        lanes[i].push(seg); seg.lane = i; placed = true; break;
      }
    }
    if (!placed) { seg.lane = lanes.length; lanes.push([seg]); }
  });

  let cells = "", monthStarts = false;
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    const out = d < RANGE_START || d > RANGE_END;
    const we = i >= 5;
    const today = sameDay(d, new Date());
    const hol = holidayFor(d);
    const isFirst = d.getDate() === 1 && !out;
    if (isFirst) monthStarts = true;
    const monthTag = isFirst ? `<span class="month-tag">${d.toLocaleString("en-US", { month: "short" })}</span>` : "";
    const holLabel = (hol && !out) ? `<span class="holiday-name" title="${hol.name}">${hol.short}</span>` : "";
    cells += `<div class="daycell ${we ? "weekend" : ""} ${hol ? "holiday" : ""} ${out ? "out" : ""} ${today ? "today" : ""} ${isFirst ? "first" : ""}" style="grid-column:${i + 1};grid-row:1 / -1;">${monthTag}<span class="daynum">${d.getDate()}</span>${holLabel}</div>`;
  }

  return { segs, cells, monthStarts, weekIndex, laneCount: lanes.length };
}

function weekHTML(w, maxLanes) {
  let bars = "";
  w.segs.forEach(seg => {
    const clip = `${seg.clipL ? "clipL" : ""} ${seg.clipR ? "clipR" : ""}`;
    const st = statusOf(seg.ev);
    const cls = `ev-${seg.ev.cat} ${st === "tentative" ? "tentative" : ""} ${seg.ev.ongoing ? "ongoing" : ""} ${clip}`;
    const prefix = st === "tentative" ? "◌ " : "";
    bars += `<div class="evbar ${cls}" title="${seg.ev.t}" style="grid-column:${seg.colStart} / span ${seg.span};grid-row:${seg.lane + 2};">${prefix}${seg.ev.t}</div>`;
  });

  const sep = (w.monthStarts && w.weekIndex > 0) ? "month-start" : "";
  return `<div class="week ${sep}" style="grid-template-rows:minmax(20px, auto) repeat(${maxLanes}, 22px);">${w.cells}${bars}</div>`;
}

function renderAll() { renderStats(); renderCalendar(); }
renderAll();
</script>
</body>
</html>
